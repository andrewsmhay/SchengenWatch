# ==============================================================================
# parent_company_graph.yaml
# ==============================================================================
# Purpose   : Single source of truth for corporate ownership chains, ASN mappings,
#             MaxMind pattern matching, and jurisdiction tag assignments.
#             Jurisdiction tag definitions live in jurisdiction_policy.yaml.
#
# Maintainer: Network Security / SOC Team
# Review    : Quarterly + on significant M&A events
# Version   : 2.0.0
# Updated   : 2026-04
#
# STRUCTURE:
#   - tier 0 = Ultimate Beneficial Owner (UBO) — no parent reference
#   - tier 1 = Direct subsidiary of UBO
#   - tier 2+ = Deeper subsidiaries
#
# TAGGING RULES:
#   - jurisdiction_tags are set ONLY on tier-0 (UBO) entities
#   - Tags cascade automatically down the ownership chain via graph traversal
#   - Do NOT duplicate tags on child entities — set them on the root only
#   - Exception: a child incorporated in a DIFFERENT jurisdiction may carry
#     additional tags (e.g. UK subsidiary of US parent → UK_IPA + cascade US_CLOUD_ACT)
#   - Exception: a child with significant R&D operations in a different
#     jurisdiction may carry additional tags (e.g. Wiz IL R&D under US parent)
#
# OWNERSHIP POLICY (aligned with jurisdiction_policy.yaml v2.0):
#   - PE-owned entities: tagged by incorporation of operational entity, not PE fund
#   - Joint Ventures: tag by jurisdiction of majority owner (≥50%)
#   - Hong Kong / Cayman holdings without PRC operational control: note only,
#     no CN_NSL tag (e.g. CK Hutchison)
#
# CHANGELOG:
#   2.0.0 (2026-04) : Expanded to 9 jurisdictions (added AU_TOLA, RU_SORM,
#                     KR_PIPA, IN_DPDP, IL_NSL). Added Comcast, Liberty Global,
#                     T-Mobile US, Charter as new tier-0 US entities.
#                     Restructured Sky UK under Comcast UBO.
#                     Restructured Vodafone UK as VodafoneThree JV under
#                     Vodafone Group plc. Added extensive networking hardware,
#                     security vendor, SaaS, and international sections.
#   1.0.0 (2025-04) : Initial release.
#
# SOURCES:
#   - SEC EDGAR (US incorporations)
#   - Companies House (UK incorporations)
#   - Handelsregister (DE incorporations)
#   - GLEIF LEI database
#   - RIPE / ARIN / APNIC / LACNIC / AFRINIC WHOIS
#   - MaxMind GeoLite2-ASN (org_name field)
#   - RouteViews / RIPE RIS BGP dumps
#   - Investor relations filings (10-K, 20-F, annual reports)
#   - CMA / EU Commission / DOJ merger approvals
# ==============================================================================

